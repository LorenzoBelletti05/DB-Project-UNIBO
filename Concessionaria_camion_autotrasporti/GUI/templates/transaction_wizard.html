{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
    <h2 class="h3 text-primary mb-0">Transaction Wizard</h2>
</div>

<div class="card shadow-sm border-0">
    <div class="card-header bg-white border-bottom pt-4 pb-3 px-4">
        <div class="d-flex justify-content-between">
            <div class="text-center w-100 fw-bold text-primary" id="step1-indicator">Step 1: Vehicle</div>
            <div class="text-center w-100 fw-bold text-muted" id="step2-indicator">Step 2: Type</div>
            <div class="text-center w-100 fw-bold text-muted" id="step3-indicator">Step 3: Details</div>
        </div>
        <div class="progress mt-2" style="height: 5px;">
            <div class="progress-bar bg-primary transition-all" id="wizard-progress" role="progressbar" style="width: 33%;" aria-valuenow="33" aria-valuemin="0" aria-valuemax="100"></div>
        </div>
    </div>

    <div class="card-body p-4">
        <form id="transactionForm" method="POST" action="/api/create_transaction">
            
            <div id="step1" class="wizard-step">
                <h5 class="mb-3">Select Vehicle</h5>
                <div class="mb-3">
                    <label class="form-label text-dark fw-bold">Available Vehicles</label>
                    <select name="vehicle_id" class="form-select border-primary" id="vehicleSelect" required>
                        <option value="">Choose a vehicle...</option>
                        {% for v in available_vehicles %}
                        <option value="{{ v.id }}">{{ v.brand }} {{ v.model }} - €{{ v.price }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="text-end mt-4">
                    <button type="button" class="btn btn-primary px-4 fw-bold" onclick="nextStep(1)">Next ➔</button>
                </div>
            </div>

            <div id="step2" class="wizard-step d-none">
                <h5 class="mb-3">Select Contract Type</h5>
                <div class="row g-3 mb-3">
                    <div class="col-md-3">
                        <input type="radio" class="btn-check" name="contract_type" id="typeSale" value="SALE" checked>
                        <label class="btn btn-outline-primary w-100 p-3 fw-bold" for="typeSale">🛍️ Sale</label>
                    </div>
                    <div class="col-md-3">
                        <input type="radio" class="btn-check" name="contract_type" id="typeRental" value="RENTAL">
                        <label class="btn btn-outline-primary w-100 p-3 fw-bold" for="typeRental">⏳ Rental</label>
                    </div>
                    <div class="col-md-3">
                        <input type="radio" class="btn-check" name="contract_type" id="typeFinancing" value="FINANCING">
                        <label class="btn btn-outline-primary w-100 p-3 fw-bold" for="typeFinancing">🏦 Financing</label>
                    </div>
                    <div class="col-md-3">
                        <input type="radio" class="btn-check" name="contract_type" id="typeLeasing" value="LEASING">
                        <label class="btn btn-outline-primary w-100 p-3 fw-bold" for="typeLeasing">📄 Leasing</label>
                    </div>
                </div>
                <div class="d-flex justify-content-between mt-4">
                    <button type="button" class="btn btn-outline-secondary px-4 fw-bold" onclick="prevStep(2)">⬅ Back</button>
                    <button type="button" class="btn btn-primary px-4 fw-bold" onclick="nextStep(2)">Next ➔</button>
                </div>
            </div>

            <div id="step3" class="wizard-step d-none">
                <h5 class="mb-3">Dates & Payment</h5>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label text-dark fw-bold">Start Date</label>
                        <input type="date" name="start_date" id="startDate" class="form-control" required onchange="validateDates()">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-dark fw-bold">End Date (Rental/Leasing)</label>
                        <input type="date" name="end_date" id="endDate" class="form-control" onchange="validateDates()">
                        <small id="dateError" class="text-danger d-none fw-bold mt-1">End date cannot be before Start date!</small>
                    </div>
                </div>

                <div class="mb-4 mt-3">
                    <label class="form-label text-dark fw-bold">Payment Method</label>
                    <select name="payment_method" class="form-select border-primary" required>
                        <option value="BANK_TRANSFER">Bank Transfer</option>
                        <option value="CREDIT_CARD">Credit Card</option>
                        <option value="CASH">Cash</option>
                        <option value="FINANCE_PLAN">Finance Plan</option>
                    </select>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <button type="button" class="btn btn-outline-secondary px-4 fw-bold" onclick="prevStep(3)">⬅ Back</button>
                    <button type="submit" class="btn btn-success px-4 fw-bold" id="submitBtn">Generate Contract ✅</button>
                </div>
            </div>

        </form>
    </div>
</div>

<script>
// Logic to handle steps transition and validation
function nextStep(currentStep) {
    if (currentStep === 1 && !document.getElementById('vehicleSelect').value) {
        alert('Please select a vehicle first.');
        return;
    }

    document.getElementById(`step${currentStep}`).classList.add('d-none');
    document.getElementById(`step${currentStep + 1}`).classList.remove('d-none');
    updateProgress(currentStep + 1);
}

function prevStep(currentStep) {
    document.getElementById(`step${currentStep}`).classList.add('d-none');
    document.getElementById(`step${currentStep - 1}`).classList.remove('d-none');
    updateProgress(currentStep - 1);
}

function updateProgress(step) {
    const bar = document.getElementById('wizard-progress');
    bar.style.width = (step * 33.33) + '%';
    
    for (let i = 1; i <= 3; i++) {
        const indicator = document.getElementById(`step${i}-indicator`);
        if (i === step) {
            indicator.classList.remove('text-muted');
            indicator.classList.add('text-primary');
        } else {
            indicator.classList.remove('text-primary');
            indicator.classList.add('text-muted');
        }
    }
}

// Security logic to prevent inconsistent date selection
function validateDates() {
    const start = document.getElementById('startDate').value;
    const end = document.getElementById('endDate').value;
    const errorMsg = document.getElementById('dateError');
    const submitBtn = document.getElementById('submitBtn');

    if (start && end && end < start) {
        errorMsg.classList.remove('d-none');
        submitBtn.disabled = true;
    } else {
        errorMsg.classList.add('d-none');
        submitBtn.disabled = false;
    }
}
</script>

<style>
.transition-all { transition: all 0.3s ease; }
</style>
{% endblock %}
