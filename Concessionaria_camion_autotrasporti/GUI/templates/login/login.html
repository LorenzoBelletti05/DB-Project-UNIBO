<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Accesso - AutoGest PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">

<div class="container" style="max-width: 600px;">
    
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show shadow-sm" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="card shadow border-0">
        <div class="card-header bg-white p-0 border-bottom-0">
            <ul class="nav nav-tabs nav-justified" id="myTab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active fw-bold" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-pane" type="button" role="tab">Accedi</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link fw-bold" id="register-tab" data-bs-toggle="tab" data-bs-target="#register-pane" type="button" role="tab">Registrati</button>
                </li>
            </ul>
        </div>
        
        <div class="card-body p-4">
            <div class="tab-content" id="myTabContent">
                
                <div class="tab-pane fade show active" id="login-pane" role="tabpanel">
                    <h4 class="text-center text-primary mb-4">Bentornato!</h4>
                    <form method="POST" action="/login">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Accedi alla Dashboard</button>
                    </form>
                </div>

                <div class="tab-pane fade" id="register-pane" role="tabpanel">
                    <h4 class="text-center text-success mb-3">Nuovo Cliente</h4>
                    <form method="POST" action="/registrazione">
                        
                        <h6 class="text-muted border-bottom pb-1">Dati Personali</h6>
                        <div class="row mb-2">
                            <div class="col-md-6">
                                <input type="text" name="nome" class="form-control form-control-sm" placeholder="Nome" required>
                            </div>
                            <div class="col-md-6">
                                <input type="text" name="cognome" class="form-control form-control-sm" placeholder="Cognome" required>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <input type="text" name="cf" class="form-control form-control-sm" placeholder="Codice Fiscale">
                            </div>
                            <div class="col-md-6">
                                <input type="text" name="passaporto" class="form-control form-control-sm" placeholder="N° Passaporto">
                            </div>
                        </div>

                        <h6 class="text-muted border-bottom pb-1">Residenza</h6>
                        <div class="row mb-2">
                            <div class="col-md-9">
                                <input type="text" name="via" class="form-control form-control-sm" placeholder="Via/Piazza" required>
                            </div>
                            <div class="col-md-3">
                                <input type="text" name="civico" class="form-control form-control-sm" placeholder="Civico" required>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-5">
                                <input type="text" name="citta" class="form-control form-control-sm" placeholder="Città" required>
                            </div>
                            <div class="col-md-4">
                                <input type="text" name="provincia" class="form-control form-control-sm" placeholder="Provincia (es. MI)" required>
                            </div>
                            <div class="col-md-3">
                                <input type="text" name="cap" class="form-control form-control-sm" placeholder="CAP" required>
                            </div>
                        </div>

                        <h6 class="text-muted border-bottom pb-1">Contatti e Accesso</h6>
                        <div class="mb-2">
                            <input type="tel" name="telefono" class="form-control form-control-sm" placeholder="Numero di Telefono" required>
                        </div>
                        <div class="mb-2">
                            <input type="email" name="mail" class="form-control form-control-sm" placeholder="Indirizzo Email" required>
                        </div>
                        <div class="mb-3">
                            <input type="password" name="password" class="form-control form-control-sm" placeholder="Crea una Password" required>
                        </div>

                        <button type="submit" class="btn btn-success w-100 mt-2">Registra Account</button>
                    </form>
                </div>
                
            </div>
        </div>
    </div>
</div>

</body>
</html>
