<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concessionaria Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .sidebar { height: 100vh; background-color: #2c3e50; color: white; padding-top: 20px;}
        .sidebar a { color: #ecf0f1; text-decoration: none; padding: 10px 20px; display: block;}
        .sidebar a:hover { background-color: #34495e; }
        .bg-light-gray { background-color: #f8f9fa; }
    </style>
</head>
<body class="bg-light-gray">

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 d-none d-md-block sidebar">
            <h4 class="text-center mb-4">AutoGest PRO</h4>
            <a href="/">📊 Dashboard</a>
            <a href="/inventario">🚗 Inventario Auto</a>
            <a href="#">📝 Contratti</a>
            <a href="#">💰 Vendite</a>
            <a href="/officina">🔧 Officina</a>
            <a href="/clienti">👥 Clienti</a>
            <a href="#">⚙️ Impostazioni</a>
        </nav>

        <main class="col-md-10 ms-sm-auto px-md-4 py-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-4 border-bottom">
                <h1 class="h2">Dashboard Principale</h1>
                <div class="user-info">👤 Benvenuto, Amministratore</div>
            </div>

            {% block content %}{% endblock %}
            
        </main>
    </div>
</div>

</body>
</html>
