{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Storico Contratti</h3>
    <button class="btn btn-success">Genera Contratto</button>
</div>

<div class="card shadow-sm">
    <div class="card-body p-0">
        <table class="table table-striped table-hover m-0">
            <thead class="table-dark">
                <tr>
                    <th>ID Contratto</th>
                    <th>Tipo</th>
                    <th>Data Stipula</th>
                    <th>Importo Totale</th>
                    <th>Cliente</th>
                    <th>Azioni</th>
                </tr>
            </thead>
            <tbody>
                {% for c in contratti %}
                <tr>
                    <td><strong>{{ c.id }}</strong></td>
                    <td>{{ c.tipo }}</td>
                    <td>{{ c.data }}</td>
                    <td>€ {{ c.importo }}</td>
                    <td>{{ c.cliente }}</td>
                    <td><button class="btn btn-sm btn-outline-dark">PDF</button></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
