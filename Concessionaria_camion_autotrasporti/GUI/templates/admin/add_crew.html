{% extends "layout.html" %}

{% block content %}
<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Assumi Nuovo Dipendente</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST" action="/admin/add_crew">
                        
                        <!-- Scelta del Ruolo -->
                        <div class="mb-4 p-3 bg-light border rounded">
                            <label class="form-label fw-bold">Ruolo Aziendale</label>
                            <select name="ruolo" class="form-select border-primary" required>
                                <option value="" disabled selected>Seleziona la mansione...</option>
                                <option value="3">Venditore</option>
                                <option value="2">Meccanico</option>
                                <option value="5">Impiegato Ufficio</option>
                            </select>
                            <small class="text-muted">Il ruolo determinerà a quali aree del gestionale avrà accesso.</small>
                        </div>

                        <h6 class="text-muted border-bottom pb-1">Dati Anagrafici</h6>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Nome</label>
                                <input type="text" name="nome" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Cognome</label>
                                <input type="text" name="cognome" class="form-control" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Codice Fiscale</label>
                                <input type="text" name="cf" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Indirizzo di Residenza</label>
                                <input type="text" name="residenza" class="form-control" placeholder="Via, Civico, Città..." required>
                            </div>
                        </div>

                        <h6 class="text-muted border-bottom pb-1 mt-4">Contatti e Credenziali</h6>
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label">Telefono</label>
                                <input type="tel" name="telefono" class="form-control" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Email Lavorativa</label>
                                <input type="email" name="mail" class="form-control" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a href="/admin_dashboard" class="btn btn-outline-secondary">Annulla</a>
                            <button type="submit" class="btn btn-primary">Registra Dipendente</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
