{% extends "layout.html" %}

{% block content %}
<div class="container mt-4 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="text-primary mb-0">📝 Nuova Transazione</h2>
            <p class="text-muted">Crea un nuovo preventivo o registra una vendita.</p>
        </div>
        <a href="/salesperson" class="btn btn-outline-secondary">Torna alla Dashboard</a>
    </div>

    <form method="POST" action="/transaction_wizard">
        <div class="row">
            
            <div class="col-md-8">
                
                <div class="card shadow-sm mb-4 border-0">
                    <div class="card-header bg-dark text-white fw-bold">
                        1. Dati Cliente
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Seleziona Cliente Esistente</label>
                            <select name="id_cliente" class="form-select border-primary" required>
                                <option value="" disabled selected>Cerca cliente in archivio...</option>
                                {% for cliente in clienti %}
                                    <option value="{{ cliente.ID_Persona }}">
                                        {{ cliente.Nome }} {{ cliente.Cognome }} - {{ cliente.CF }}
                                    </option>
                                {% endfor %}
                            </select>
                            <div class="mt-2 text-end">
                                <small class="text-muted">Il cliente non c'è?</small>
                                <a href="#" class="text-decoration-none small fw-bold">Crea nuova anagrafica</a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm mb-4 border-0">
                    <div class="card-header bg-dark text-white fw-bold">
                        2. Veicolo d'Interesse
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Seleziona Veicolo dal Catalogo</label>
                            <select name="targa_veicolo" class="form-select border-primary" required>
                                <option value="" disabled selected>Scegli dal parco auto...</option>
                                {% for veicolo in veicoli %}
                                    <option value="{{ veicolo.Targa }}">
                                        {{ mappa_marche.get(veicolo.ID_Marca, '') }} {{ veicolo.Modello }} - Targa/Telaio: {{ veicolo.Targa }} (Listino: €{{ veicolo.Prezzo_Base }})
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>

            </div>

            <div class="col-md-4">
                
                <div class="card shadow-sm mb-4 border-0">
                    <div class="card-header bg-success text-white fw-bold">
                        3. Riepilogo Economico
                    </div>
                    <div class="card-body bg-light">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Prezzo Finale Proposto (€)</label>
                            <input type="number" step="0.01" name="prezzo_finale" class="form-control form-control-lg text-success fw-bold" placeholder="0.00" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Validità Preventivo</label>
                            <select name="scadenza" class="form-select">
                                <option value="7">7 Giorni</option>
                                <option value="15">15 Giorni</option>
                                <option value="30" selected>30 Giorni</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Note aggiuntive</label>
                            <textarea name="note" class="form-control" rows="3" placeholder="Sconti applicati, richieste extra del cliente..."></textarea>
                        </div>
                        
                        <hr>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" name="azione" value="preventivo" class="btn btn-warning fw-bold text-dark">
                                📄 Salva come Preventivo
                            </button>
                            <button type="submit" name="azione" value="vendita" class="btn btn-success fw-bold">
                                🤝 Conferma Vendita
                            </button>
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </form>
</div>
{% endblock %}
