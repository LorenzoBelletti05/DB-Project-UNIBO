{% extends "base.html" %}

    {% block content %}
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
            <h2 class="h3 text-primary mb-0">Transaction Wizard</h2>
        </div>

            <div class="card shadow-sm border-0">
                <div class="card-header bg-white border-bottom pt-4 pb-3 px-4">
                    <div class="d-flex justify-content-between">
                        <div class="text-center w-100 fw-bold text-primary" id="step1-indicator">Step 1: Cliente e Veicolo</div>
                        <div class="text-center w-100 fw-bold text-muted" id="step2-indicator">Step 2: Tipo Contratto</div>
                        <div class="text-center w-100 fw-bold text-muted" id="step3-indicator">Step 3: Dettagli e Pagamento</div>
                    </div>
                    <div class="progress mt-2" style="height: 5px;">
                        <div class="progress-bar bg-primary transition-all" id="wizard-progress" role="progressbar" style="width: 33%;" aria-valuenow="33" aria-valuemin="0" aria-valuemax="100"></div>
                    </div>
                </div>

                <div class="card-body p-4">
                    <form id="transactionForm" method="POST" action="/transaction_wizard">

                        <div id="step1" class="wizard-step">
                            <h5 class="mb-3">Seleziona Cliente e Veicolo</h5>
                            
                            <div class="mb-3">
                                <label class="form-label text-dark fw-bold">Cliente Acquirente</label>
                                <select name="id_cliente" class="form-select border-primary" id="clienteSelect" required>
                                    <option value="">Scegli un cliente...</option>
                                    {% for c in clienti %}
                                    <option value="{{ c.ID_Persona }}">{{ c.Nome }} {{ c.Cognome }} ({{ c.CF }})</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label text-dark fw-bold">Veicoli Disponibili</label>
                                <select name="numero_telaio" class="form-select border-primary" id="vehicleSelect" required>
                                    <option value="">Scegli un veicolo...</option>
                                    {% for v in veicoli %}
                                    <option value="{{ v.NumeroTelaio }}">{{ mappa_marche.get(v.ID_Marca, '') }} {{ v.Modello }} - €{{ v.Prezzo_Base }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="text-end mt-4">
                                <button type="button" class="btn btn-primary px-4 fw-bold" onclick="nextStep(1)">Avanti ➔</button>
                            </div>
                        </div>

                        <div id="step2" class="wizard-step d-none">
                            <h5 class="mb-3">Seleziona Tipo di Contratto</h5>
                            <div class="row g-3 mb-3">
                                <div class="col-md-3">
                                    <input type="radio" class="btn-check" name="contract_type" id="typeSale" value="Vendita" checked>
                                    <label class="btn btn-outline-primary w-100 p-3 fw-bold" for="typeSale">Vendita</label>
                                </div>
                                <div class="col-md-3">
                                    <input type="radio" class="btn-check" name="contract_type" id="typeRental" value="Noleggio">
                                    <label class="btn btn-outline-primary w-100 p-3 fw-bold" for="typeRental">Noleggio</label>
                                </div>
                                <div class="col-md-3">
                                    <input type="radio" class="btn-check" name="contract_type" id="typeFinancing" value="Finanziamento">
                                    <label class="btn btn-outline-primary w-100 p-3 fw-bold" for="typeFinancing">Finanziamento</label>
                                </div>
                                <div class="col-md-3">
                                    <input type="radio" class="btn-check" name="contract_type" id="typeLeasing" value="Leasing">
                                    <label class="btn btn-outline-primary w-100 p-3 fw-bold" for="typeLeasing">Leasing</label>
                                </div>
                            </div>
                            <div class="d-flex justify-content-between mt-4">
                                <button type="button" class="btn btn-outline-secondary px-4 fw-bold" onclick="prevStep(2)">Indietro</button>
                                <button type="button" class="btn btn-primary px-4 fw-bold" onclick="nextStep(2)">Avanti</button>
                            </div>
                        </div>

                        <div id="step3" class="wizard-step d-none">
                            <h5 class="mb-3">Date & Pagamento</h5>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label text-dark fw-bold">Data Inizio Decorrenza</label>
                                    <input type="date" name="start_date" id="startDate" class="form-control" required onchange="validateDates()">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-dark fw-bold">Data Fine (Noleggio/Leasing)</label>
                                    <input type="date" name="end_date" id="endDate" class="form-control" onchange="validateDates()">
                                    <small id="dateError" class="text-danger d-none fw-bold mt-1">La data di fine non può precedere l'inizio!</small>
                                </div>
                            </div>

                            <div class="mb-4 mt-3">
                                <label class="form-label text-dark fw-bold">Metodo di Pagamento</label>
                                <select name="payment_method" class="form-select border-primary" required>
                                    <option value="Bonifico">Bonifico Bancario</option>
                                    <option value="Carta di Credito">Carta di Credito</option>
                                    <option value="Assegno">Assegno</option>
                                </select>
                            </div>

                            <div class="d-flex justify-content-between mt-4">
                                <button type="button" class="btn btn-outline-secondary px-4 fw-bold" onclick="prevStep(3)">Indietro</button>
                                <button type="submit" class="btn btn-success px-4 fw-bold" id="submitBtn">Genera Contratto</button>
                            </div>
                        </div>

                    </form>
                </div>
            </div>

            <script>
            function nextStep(currentStep) {
                if (currentStep === 1 && (!document.getElementById('vehicleSelect').value || !document.getElementById('clienteSelect').value)) {
                    alert('Seleziona sia il cliente che il veicolo per proseguire.');
                    return;
                }
                document.getElementById(`step${currentStep}`).classList.add('d-none');
                document.getElementById(`step${currentStep + 1}`).classList.remove('d-none');
                updateProgress(currentStep + 1);
            }

            function prevStep(currentStep) {
                document.getElementById(`step${currentStep}`).classList.add('d-none');
                document.getElementById(`step${currentStep - 1}`).classList.remove('d-none');
                updateProgress(currentStep - 1);
            }

            function updateProgress(step) {
                const bar = document.getElementById('wizard-progress');
                bar.style.width = (step * 33.33) + '%';
                for (let i = 1; i <= 3; i++) {
                    const indicator = document.getElementById(`step${i}-indicator`);
                    if (i === step) {
                        indicator.classList.remove('text-muted');
                        indicator.classList.add('text-primary');
                    } else {
                        indicator.classList.remove('text-primary');
                        indicator.classList.add('text-muted');
                    }
                }
            }

            function validateDates() {
                const start = document.getElementById('startDate').value;
                const end = document.getElementById('endDate').value;
                const errorMsg = document.getElementById('dateError');
                const submitBtn = document.getElementById('submitBtn');

                if (start && end && end < start) {
                    errorMsg.classList.remove('d-none');
                    submitBtn.disabled = true;
                } else {
                    errorMsg.classList.add('d-none');
                    submitBtn.disabled = false;
                }
            }
        </script>

    <style>
    .transition-all { transition: all 0.3s ease; }
    </style>
{% endblock %}
