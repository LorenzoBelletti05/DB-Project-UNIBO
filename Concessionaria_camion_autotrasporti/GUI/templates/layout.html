<!DOCTYPE html>
<html lang="it">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>AutoGest PRO</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">AutoGest PRO</a>
            <div class="navbar-nav ms-auto align-items-center">
                
                {% if session.get('ruolo') == 4 %}
                    <a class="nav-link" href="/admin/utenti">Gestione Utenti</a>
                    <a class="nav-link fw-bold" href="/admin/catalog">Gestione Catalogo</a>
                
                {% elif session.get('ruolo') == 1 %}
                    <a class="nav-link" href="/area_cliente">La mia Area</a>
                    <a class="nav-link fw-bold text-primary" href="/catalog">📖 Public Catalog</a>
                
                {% elif session.get('ruolo') == 3 %} <a class="nav-link" href="/catalog">📖 Public Catalog</a>
                    <a class="nav-link" href="/salesperson">💼 Sales Dashboard</a>
                    <a class="nav-link" href="/transaction_wizard">📝 New Transaction</a>
                {% endif %}
                
                <a href="/logout" class="btn btn-outline-danger btn-sm ms-3">Esci</a>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
